<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQ — Your Token</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f172a;
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #3b82f6;
        }

        .business-name {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 2px solid #334155;
            margin-top: 20px;
        }

        .label {
            font-size: 0.9rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .token-number {
            font-size: 5rem;
            font-weight: bold;
            color: #3b82f6;
            line-height: 1;
            margin: 10px 0 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .status-waiting {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .status-called {
            background: #064e3b;
            color: #34d399;
            animation: pulse 1.5s infinite;
        }

        .status-done {
            background: #334155;
            color: #94a3b8;
        }

        .status-no_show, .status-left {
            background: #7f1d1d;
            color: #fca5a5;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #94a3b8;
        }

        .info-value {
            font-weight: bold;
            color: white;
        }

        .info-value.highlight {
            color: #f59e0b;
            font-size: 1.2rem;
        }

        .leave-btn {
            background: #7f1d1d;
            color: #fca5a5;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }

        .leave-btn:hover {
            background: #991b1b;
        }

        .leave-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .called-message {
            background: #064e3b;
            color: #6ee7b7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            margin-top: 30px;
        }

        .last-updated {
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">SmartQ</div>
    <div class="business-name" id="businessName">Loading...</div>
</div>

<div class="card" id="card">
    <p style="color:#64748b">Loading your token...</p>
</div>

<div class="footer">
    SmartQ — Queue smarter, wait less
</div>
<div class="last-updated" id="lastUpdated"></div>

<script>
    // Get token ID from URL
    // Usage: token-status.html?tokenId=1
    const params = new URLSearchParams(window.location.search);
    const tokenId = params.get('tokenId');

    if (!tokenId) {
        document.getElementById('card').innerHTML =
            '<p style="color:#fca5a5">No token ID provided</p>';
    }

    async function loadStatus() {
        try {
            // Get token from localStorage (saved during generation)
            const authToken = localStorage.getItem('smartq_token');

            const response = await fetch(
                `/api/token/status/${tokenId}`, {
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });

            if (!response.ok) {
                throw new Error('Failed to load token');
            }

            const data = await response.json();

            document.getElementById('businessName')
                .textContent = data.businessName;

            const card = document.getElementById('card');
            const statusClass = 'status-' +
                data.status.toLowerCase();

            let statusText = data.status;
            let extraContent = '';

            if (data.status === 'CALLED') {
                extraContent = `
                    <div class="called-message">
                        🔔 ${data.calledMessage}
                    </div>`;
                statusText = '🎉 YOUR TURN NOW';
            } else if (data.status === 'DONE') {
                statusText = '✅ COMPLETED';
            } else if (data.status === 'WAITING') {
                statusText = '⏳ WAITING';
            } else if (data.status === 'NO_SHOW') {
                statusText = '❌ MISSED TURN';
            } else if (data.status === 'LEFT') {
                statusText = 'LEFT QUEUE';
            }

            card.innerHTML = `
                ${extraContent}
                <div class="label">Your Token</div>
                <div class="token-number">#${data.tokenNumber}</div>
                <div class="status-badge ${statusClass}">
                    ${statusText}
                </div>
                <div class="info-row">
                    <span class="info-label">Counter</span>
                    <span class="info-value">${data.counterName}</span>
                </div>
                ${data.status === 'WAITING' ? `
                <div class="info-row">
                    <span class="info-label">Position in Queue</span>
                    <span class="info-value highlight">
                        ${data.positionInQueue}
                    </span>
                </div>
                <div class="info-row">
                    <span class="info-label">Estimated Wait</span>
                    <span class="info-value highlight">
                        ${data.estimatedWaitMins} mins
                    </span>
                </div>
                ` : ''}
                <div class="info-row">
                    <span class="info-label">Now Serving</span>
                    <span class="info-value">
                        #${data.currentlyServing || '--'}
                    </span>
                </div>
                <div class="info-row">
                    <span class="info-label">Total Waiting</span>
                    <span class="info-value">${data.totalWaiting}</span>
                </div>
                ${data.status === 'WAITING' ? `
                <button class="leave-btn" onclick="leaveQueue()">
                    Leave Queue
                </button>
                ` : ''}
            `;

            document.getElementById('lastUpdated').textContent =
                'Last updated: ' +
                new Date().toLocaleTimeString('en-IN');

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('card').innerHTML =
                '<p style="color:#fca5a5">Error loading token. ' +
                'Please make sure you are logged in.</p>';
        }
    }

    async function leaveQueue() {
        if (!confirm('Are you sure you want to leave the queue?')) {
            return;
        }

        try {
            const authToken = localStorage.getItem('smartq_token');

            await fetch(`/api/token/leave/${tokenId}`, {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });

            loadStatus();
        } catch (error) {
            console.error('Error leaving queue:', error);
        }
    }

    // Load immediately then refresh every 10 seconds
    loadStatus();
    setInterval(loadStatus, 10000);
</script>

</body>
</html>
