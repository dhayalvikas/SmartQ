<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQ — Owner Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%8E%9F%EF%B8%8F</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }
        .header { background: #1e293b; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #3b82f6; }
        .logout-btn { background: #334155; color: #94a3b8; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        /* Auth Screen */
        .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .auth-card { background: #1e293b; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid #334155; }
        .auth-card h2 { margin-bottom: 8px; color: #3b82f6; }
        .auth-card p { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        .auth-tabs { display: flex; margin-bottom: 20px; background: #0f172a; border-radius: 10px; padding: 4px; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; color: #64748b; font-size: 0.9rem; }
        .auth-tab.active { background: #3b82f6; color: white; font-weight: bold; }
        .auth-card input, .auth-card select {
            width: 100%; padding: 12px; margin-bottom: 12px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: white; font-size: 1rem;
        }
        .auth-card input:focus { outline: none; border-color: #3b82f6; }
        .auth-card button {
            width: 100%; padding: 12px; background: #3b82f6;
            border: none; border-radius: 8px; color: white;
            font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .auth-card button:hover { background: #2563eb; }
        .auth-card button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #fca5a5; font-size: 0.85rem; margin-top: 8px; }
        .success-msg { color: #34d399; font-size: 0.85rem; margin-top: 8px; }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        .spinner.show { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1e293b; border: 1px solid #334155; border-left: 4px solid #3b82f6;
            border-radius: 8px; padding: 14px 18px; min-width: 260px; max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            font-size: 0.9rem;
        }
        .toast.success { border-left-color: #34d399; }
        .toast.error { border-left-color: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }

        /* Dashboard */
        .main { padding: 30px 40px; display: none; }
        .business-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .business-tab { background: #1e293b; border: 1px solid #334155; padding: 10px 20px; border-radius: 10px; cursor: pointer; color: #94a3b8; }
        .business-tab.active { border-color: #3b82f6; color: #3b82f6; background: #1e3a5f; }
        .btn-add-business { background: #16a34a; color: white; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .btn-add-business:hover { background: #15803d; }

        /* Create Business Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #1e293b; border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; border: 1px solid #334155; max-height: 90vh; overflow-y: auto; }
        .modal h3 { color: #3b82f6; margin-bottom: 20px; font-size: 1.2rem; }
        .modal input, .modal select, .modal textarea {
            width: 100%; padding: 10px 12px; margin-bottom: 12px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: white; font-size: 0.95rem;
        }
        .modal input:focus, .modal select:focus { outline: none; border-color: #3b82f6; }
        .modal-footer { display: flex; gap: 10px; margin-top: 8px; }
        .modal-footer button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-confirm { background: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-cancel { background: #334155; color: #94a3b8; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* QR Code section */
        .qr-section { text-align: center; padding: 20px; background: #0f172a; border-radius: 10px; border: 1px solid #334155; margin-top: 16px; }
        .qr-section img { width: 200px; height: 200px; border-radius: 8px; }
        .qr-section p { color: #64748b; font-size: 0.85rem; margin-top: 8px; }
        .qr-link { color: #3b82f6; font-size: 0.8rem; word-break: break-all; margin-top: 4px; display: block; }

        /* Grid and cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-label { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #3b82f6; }
        .section { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .section h3 { margin-bottom: 16px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }

        /* Counters */
        .counter-row { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #0f172a; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; flex-wrap: wrap; gap: 10px; }
        .counter-row.inactive { opacity: 0.5; }
        .counter-info { flex: 1; min-width: 200px; }
        .counter-name { font-weight: bold; margin-bottom: 4px; }
        .counter-meta { color: #94a3b8; font-size: 0.85rem; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: bold; margin-left: 8px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-secondary { background: #334155; color: #94a3b8; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .queue-toggle { display: flex; align-items: center; gap: 12px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge-open { background: #064e3b; color: #34d399; }
        .badge-closed { background: #7f1d1d; color: #fca5a5; }
        .new-counter-form { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .new-counter-form input, .new-counter-form select { padding: 8px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }

        /* Chart */
        .chart-container { display: flex; align-items: flex-end; gap: 8px; height: 140px; padding-bottom: 24px; }
        .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
        .chart-bar { width: 100%; background: #3b82f6; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.4s ease; }
        .chart-bar:hover { background: #60a5fa; }
        .chart-label { font-size: 0.65rem; color: #64748b; text-align: center; }
        .chart-value { font-size: 0.7rem; color: #94a3b8; }
        .analytics-footer { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #334155; }
        .analytics-item { font-size: 0.85rem; color: #64748b; }

        /* Feedback */
        .feedback-item { padding: 12px; background: #0f172a; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
        .feedback-header { display: flex; justify-content: space-between; margin-bottom: 6px; flex-wrap: wrap; gap: 6px; }
        .stars { color: #f59e0b; }
        .feedback-comment { color: #94a3b8; font-size: 0.9rem; }
        .empty-state { text-align: center; color: #64748b; padding: 30px; }
        .tv-link { display: inline-block; margin-top: 8px; color: #3b82f6; font-size: 0.85rem; text-decoration: none; }

        @media (max-width: 600px) {
            .header { padding: 16px 20px; }
            .main { padding: 20px; }
            .counter-row { flex-direction: column; align-items: flex-start; }
            .form-row { grid-template-columns: 1fr; }
            .toast-container { left: 10px; right: 10px; }
            .toast { max-width: none; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
    <div class="auth-card">
        <h2>SmartQ</h2>
        <p>Queue Management for your Business</p>

        <div class="auth-tabs">
            <div class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Login</div>
            <div class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">Register</div>
        </div>

        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="loginBtn" onclick="login()">
                <span id="loginBtnText">Login →</span>
                <span class="spinner" id="loginSpinner"></span>
            </button>
            <div class="error-msg" id="loginError"></div>
        </div>

        <div id="registerForm" style="display:none">
            <input type="text" id="regName" placeholder="Your Full Name">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password (min 6 chars)">
            <input type="tel" id="regPhone" placeholder="Phone (optional)">
            <button id="registerBtn" onclick="registerOwner()">
                <span id="registerBtnText">Create Account →</span>
                <span class="spinner" id="registerSpinner"></span>
            </button>
            <div class="error-msg" id="registerError"></div>
            <div class="success-msg" id="registerSuccess"></div>
        </div>
    </div>
</div>

<!-- CREATE BUSINESS MODAL -->
<div class="modal-overlay" id="createBusinessModal">
    <div class="modal">
        <h3>🏢 Create New Business</h3>
        <input type="text" id="bizName" placeholder="Business Name *">
        <select id="bizType" onchange="updateCounterTypePreview()">
            <option value="">Select Business Type *</option>
            <option value="RESTAURANT">🍽️ Restaurant</option>
            <option value="HOSPITAL">🏥 Hospital</option>
            <option value="BANK">🏦 Bank</option>
            <option value="SALON">✂️ Salon</option>
            <option value="GOVERNMENT">🏛️ Government Office</option>
            <option value="OTHER">🏢 Other</option>
        </select>
        <div class="form-row">
            <input type="text" id="bizAddress" placeholder="Address *">
            <input type="text" id="bizCity" placeholder="City *">
        </div>
        <div class="form-row">
            <input type="number" id="bizMaxQueue" placeholder="Max Queue Size" value="50">
            <input type="number" id="bizAvgService" placeholder="Avg Service (mins)" value="10">
        </div>
        <input type="text" id="bizCalledMessage" placeholder="Called message (optional)" value="Your turn has arrived. Please proceed.">
        <div class="error-msg" id="createBizError"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" id="createBizBtn" onclick="createBusiness()">
                <span id="createBizBtnText">Create Business</span>
                <span class="spinner" id="createBizSpinner"></span>
            </button>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="header">
        <div class="logo">SmartQ — Owner Dashboard</div>
        <div>
            <span id="ownerName" style="margin-right:16px; color:#94a3b8;"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main" id="mainContent">
        <div class="business-tabs" id="businessTabs">
            <button class="btn-add-business" onclick="openModal()">+ Add Business</button>
        </div>
        <div id="businessContent"></div>
    </div>
</div>

<script>
    const API = '';
    let authToken = localStorage.getItem('smartq_owner_token');
    let businesses = [];
    let currentBusinessId = null;

    // Counter types filtered by business type
    const counterTypesByBusiness = {
        RESTAURANT: [
            { value: 'DINE_IN', label: 'Dine In' },
            { value: 'TAKEAWAY', label: 'Takeaway' },
            { value: 'BILLING', label: 'Billing' }
        ],
        HOSPITAL: [
            { value: 'OPD', label: 'OPD' },
            { value: 'DOCTOR', label: 'Doctor Consultation' },
            { value: 'PHARMACY', label: 'Pharmacy' },
            { value: 'LAB', label: 'Lab Tests' }
        ],
        BANK: [
            { value: 'GENERAL', label: 'General Banking' },
            { value: 'ACCOUNT', label: 'Account Services' },
            { value: 'LOAN', label: 'Loan Desk' }
        ],
        SALON: [
            { value: 'CUTS', label: 'Hair Cuts' },
            { value: 'SPA', label: 'Spa Services' }
        ],
        GOVERNMENT: [
            { value: 'GENERAL', label: 'General Services' },
            { value: 'BILLING', label: 'Billing Desk' }
        ],
        OTHER: [
            { value: 'GENERAL', label: 'General' },
            { value: 'BILLING', label: 'Billing' }
        ]
    };

    if (authToken) showDashboard();

    // ── Toast Notifications ──
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        toast.textContent = `${icon} ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ── Button Loading State ──
    function setLoading(btnId, spinnerId, textId, loading, loadingText) {
        const btn = document.getElementById(btnId);
        const spinner = document.getElementById(spinnerId);
        const text = document.getElementById(textId);
        btn.disabled = loading;
        spinner.classList.toggle('show', loading);
        if (loading && loadingText) text.textContent = loadingText;
    }

    // ── Auth Tab Switch ──
    function switchAuthTab(tab) {
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('loginTab').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
        document.getElementById('registerTab').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
    }

    // ── Login ──
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        document.getElementById('loginError').textContent = '';
        if (!email || !password) { document.getElementById('loginError').textContent = 'Please fill all fields'; return; }

        setLoading('loginBtn', 'loginSpinner', 'loginBtnText', true, 'Logging in...');
        try {
            const res = await fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (!res.ok) throw new Error('Login failed');
            const data = await res.json();
            if (data.role !== 'OWNER' && data.role !== 'ADMIN') {
                document.getElementById('loginError').textContent = 'Only business owners can access this dashboard';
                setLoading('loginBtn', 'loginSpinner', 'loginBtnText', false);
                document.getElementById('loginBtnText').textContent = 'Login →';
                return;
            }
            authToken = data.token;
            localStorage.setItem('smartq_owner_token', authToken);
            localStorage.setItem('smartq_owner_name', data.name);
            showDashboard();
        } catch (err) {
            document.getElementById('loginError').textContent = 'Invalid email or password';
            setLoading('loginBtn', 'loginSpinner', 'loginBtnText', false);
            document.getElementById('loginBtnText').textContent = 'Login →';
        }
    }

    // ── Register Owner ──
    async function registerOwner() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const phone = document.getElementById('regPhone').value;
        document.getElementById('registerError').textContent = '';

        if (!name || !email || !password) {
            document.getElementById('registerError').textContent = 'Please fill all required fields';
            return;
        }
        if (password.length < 6) {
            document.getElementById('registerError').textContent = 'Password must be at least 6 characters';
            return;
        }

        setLoading('registerBtn', 'registerSpinner', 'registerBtnText', true, 'Creating account...');
        try {
            const res = await fetch(`${API}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone, role: 'OWNER' })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Registration failed');

            authToken = data.token;
            localStorage.setItem('smartq_owner_token', authToken);
            localStorage.setItem('smartq_owner_name', data.name);
            document.getElementById('registerSuccess').textContent = 'Account created! Loading dashboard...';
            setTimeout(() => showDashboard(), 800);
        } catch (err) {
            document.getElementById('registerError').textContent = err.message;
            setLoading('registerBtn', 'registerSpinner', 'registerBtnText', false);
            document.getElementById('registerBtnText').textContent = 'Create Account →';
        }
    }

    function logout() {
        localStorage.removeItem('smartq_owner_token');
        localStorage.removeItem('smartq_owner_name');
        location.reload();
    }

    function authHeaders() {
        return { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' };
    }

    async function showDashboard() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('ownerName').textContent = localStorage.getItem('smartq_owner_name') || '';
        await loadBusinesses();
    }

    // ── Modal ──
    function openModal() {
        document.getElementById('createBusinessModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('createBusinessModal').classList.remove('show');
        document.getElementById('createBizError').textContent = '';
    }

    function updateCounterTypePreview() {
        // Reserved for future live preview if needed
    }

    // ── Create Business ──
    async function createBusiness() {
        const name = document.getElementById('bizName').value;
        const businessType = document.getElementById('bizType').value;
        const address = document.getElementById('bizAddress').value;
        const city = document.getElementById('bizCity').value;
        const maxQueueSize = parseInt(document.getElementById('bizMaxQueue').value) || 50;
        const avgServiceMins = parseInt(document.getElementById('bizAvgService').value) || 10;
        const calledMessage = document.getElementById('bizCalledMessage').value;
        document.getElementById('createBizError').textContent = '';

        if (!name || !businessType || !address || !city) {
            document.getElementById('createBizError').textContent = 'Please fill all required fields';
            return;
        }

        setLoading('createBizBtn', 'createBizSpinner', 'createBizBtnText', true, 'Creating...');
        try {
            const res = await fetch(`${API}/api/business/create`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ name, businessType, address, city, maxQueueSize, avgServiceMins, calledMessage })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to create business');

            closeModal();
            ['bizName', 'bizAddress', 'bizCity'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('bizType').value = '';

            showToast(`"${name}" created successfully!`, 'success');
            await loadBusinesses();

            if (data.id) {
                currentBusinessId = data.id;
                showQrCode(data);
            }
        } catch (err) {
            document.getElementById('createBizError').textContent = err.message;
            showToast(err.message, 'error');
        } finally {
            setLoading('createBizBtn', 'createBizSpinner', 'createBizBtnText', false);
            document.getElementById('createBizBtnText').textContent = 'Create Business';
        }
    }

    function showQrCode(business) {
        if (!business.qrCodeUrl) return;
        const content = document.getElementById('businessContent');
        const qrSection = document.createElement('div');
        qrSection.className = 'section';
        qrSection.innerHTML = `
            <h3>✅ Business Created Successfully!</h3>
            <div class="qr-section">
                <p style="color:#34d399;font-size:1rem;margin-bottom:16px;">Your QR Code is ready! Print and place it at your entrance.</p>
                <img src="${business.qrCodeUrl}" alt="QR Code">
                <p>Customers scan this to join your queue</p>
                <a class="qr-link" href="#" onclick="downloadQR('${business.qrCodeUrl}', '${business.name}')">⬇️ Download QR Code</a>
            </div>
        `;
        content.insertBefore(qrSection, content.firstChild);
        setTimeout(() => qrSection.remove(), 30000);
    }

    function downloadQR(base64, name) {
        const link = document.createElement('a');
        link.href = base64;
        link.download = `SmartQ-${name}-QR.png`;
        link.click();
    }

    async function regenerateQr(businessId) {
        try {
            const res = await fetch(`${API}/api/business/regenerate-qr/${businessId}`, {
                method: 'PUT', headers: authHeaders()
            });
            if (res.ok) {
                showToast('QR code generated!', 'success');
                loadBusinessDetails(businessId);
            } else {
                showToast('Failed to generate QR', 'error');
            }
        } catch (e) {
            showToast('Network error', 'error');
        }
    }

    // ── Load Businesses ──
    async function loadBusinesses() {
        const res = await fetch(`${API}/api/business/my`, { headers: authHeaders() });
        if (!res.ok) { logout(); return; }
        businesses = await res.json();

        const tabsDiv = document.getElementById('businessTabs');
        tabsDiv.innerHTML = '<button class="btn-add-business" onclick="openModal()">+ Add Business</button>';

        if (businesses.length === 0) {
            document.getElementById('businessContent').innerHTML = `
                <div class="section" style="text-align:center;padding:40px;">
                    <div style="font-size:3rem;margin-bottom:16px;">🏢</div>
                    <div style="font-size:1.2rem;margin-bottom:8px;">No businesses yet</div>
                    <div style="color:#64748b;margin-bottom:20px;">Click "+ Add Business" to get started</div>
                    <button class="btn btn-primary" onclick="openModal()">+ Create Your First Business</button>
                </div>`;
            return;
        }

        businesses.forEach(b => {
            const tab = document.createElement('div');
            tab.className = 'business-tab' + (b.id === currentBusinessId || (!currentBusinessId && b.id === businesses[0].id) ? ' active' : '');
            tab.textContent = `${b.name} (${b.businessType})`;
            tab.onclick = () => selectBusiness(b.id);
            tabsDiv.appendChild(tab);
        });

        if (!currentBusinessId) currentBusinessId = businesses[0].id;
        loadBusinessDetails(currentBusinessId);
    }

    function selectBusiness(id) {
        currentBusinessId = id;
        document.querySelectorAll('.business-tab').forEach((tab, i) => {
            tab.classList.toggle('active', businesses[i]?.id === id);
        });
        loadBusinessDetails(id);
    }

    // ── Get counter type options HTML for a business type ──
    function getCounterTypeOptions(businessType) {
        const types = counterTypesByBusiness[businessType] || counterTypesByBusiness.OTHER;
        return types.map(t => `<option value="${t.value}">${t.label}</option>`).join('');
    }

    // ── Load Business Details ──
    async function loadBusinessDetails(businessId) {
        const business = businesses.find(b => b.id === businessId);
        if (!business) return;

        const [countersRes, analyticsRes, feedbackRes] = await Promise.all([
            fetch(`${API}/api/counter/list/${businessId}`, { headers: authHeaders() }),
            fetch(`${API}/api/business/analytics/${businessId}`, { headers: authHeaders() }),
            fetch(`${API}/api/feedback/business/${businessId}`, { headers: authHeaders() })
        ]);

        const counters = await countersRes.json();
        const analytics = await analyticsRes.json();
        const feedback = await feedbackRes.json();

        const days = analytics.last7Days || [];
        const maxVal = Math.max(...days.map(d => d.totalServed || 0), 1);
        const chartBars = days.length > 0 ? days.map(day => {
            const h = Math.max(((day.totalServed || 0) / maxVal) * 110, 4);
            return `
                <div class="chart-bar-wrap">
                    <div class="chart-value">${day.totalServed || 0}</div>
                    <div class="chart-bar" style="height:${h}px" title="${day.date}: ${day.totalServed || 0} served"></div>
                    <div class="chart-label">${day.date ? day.date.slice(5) : ''}</div>
                </div>`;
        }).join('') : '<div class="empty-state">No data yet — open the queue to start tracking</div>';

        document.getElementById('businessContent').innerHTML = `
            <div class="section">
                <h3>
                    ${business.name}
                    <span class="queue-toggle">
                        <span class="badge ${business.isQueueOpen ? 'badge-open' : 'badge-closed'}">
                            ${business.isQueueOpen ? '🟢 Queue Open' : '🔴 Queue Closed'}
                        </span>
                        ${business.isQueueOpen
                            ? `<button class="btn btn-danger" id="queueBtn" onclick="toggleQueue(${businessId}, false, this)">Close Queue</button>`
                            : `<button class="btn btn-success" id="queueBtn" onclick="toggleQueue(${businessId}, true, this)">Open Queue</button>`}
                    </span>
                </h3>
                <div class="counter-meta">
                    ${business.address || ''}, ${business.city || ''} •
                    Avg Rating: ${business.avgRating?.toFixed(1) || 'N/A'} ⭐
                    (${business.totalReviews || 0} reviews)
                </div>
                <div style="display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;">
                    <a class="tv-link" href="/tv-display.html?businessId=${businessId}" target="_blank">📺 Open TV Display →</a>
                    ${business.qrCodeUrl ? `<a class="tv-link" href="#" onclick="downloadQR('${business.qrCodeUrl}', '${business.name}')">⬇️ Download QR Code</a>` : ''}
                </div>
                ${business.qrCodeUrl ? `
                <div style="margin-top:16px;">
                    <img src="${business.qrCodeUrl}" style="width:120px;height:120px;border-radius:8px;" alt="QR">
                </div>` : `
                <div style="margin-top:12px;">
                    <button class="btn btn-primary" onclick="regenerateQr(${businessId})">🔄 Generate QR Code</button>
                </div>`}
            </div>

            <div class="grid">
                <div class="stat-card">
                    <div class="stat-label">Served Today</div>
                    <div class="stat-value">${analytics.totalServedToday || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Waiting Now</div>
                    <div class="stat-value" style="color:#f59e0b">${analytics.totalWaitingNow || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Abandoned Today</div>
                    <div class="stat-value" style="color:#ef4444">${analytics.totalAbandonedToday || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Max Queue Reached</div>
                    <div class="stat-value">${analytics.maxQueueReachedToday || 0}</div>
                </div>
            </div>

            <div class="section">
                <h3>📈 Last 7 Days — Customers Served</h3>
                <div class="chart-container">${chartBars}</div>
                <div class="analytics-footer">
                    <div class="analytics-item">Peak Hour: <span style="color:#f59e0b">${analytics.peakHourToday !== null && analytics.peakHourToday !== undefined && analytics.totalServedToday > 0 ? analytics.peakHourToday + ':00 - ' + (analytics.peakHourToday + 1) + ':00' : 'N/A'}</span></div>
                    <div class="analytics-item">Avg Wait: <span style="color:#34d399">${analytics.avgWaitMinsToday ? Math.round(analytics.avgWaitMinsToday) + ' mins' : 'N/A'}</span></div>
                    <div class="analytics-item">Avg Party: <span style="color:#3b82f6">${analytics.avgPartySizeToday ? analytics.avgPartySizeToday.toFixed(1) : 'N/A'}</span></div>
                    <div class="analytics-item">Revenue Est: <span style="color:#3b82f6">₹${analytics.revenueEstimateToday ? Math.round(analytics.revenueEstimateToday) : 0}</span></div>
                </div>
            </div>

            <div class="section">
                <h3>Counters</h3>
                <div id="countersList">
                    ${counters.length > 0 ? counters.map(c => `
                        <div class="counter-row ${!c.isActive ? 'inactive' : ''}">
                            <div class="counter-info">
                                <div class="counter-name">${c.counterName} — ${c.counterType}</div>
                                <div class="counter-meta">Now Serving: #${c.currentToken || '--'} • Served Today: ${c.tokensServedToday || 0} • Staff: ${c.staffName || 'N/A'}</div>
                            </div>
                            <div>
                                <button class="btn btn-primary" onclick="callNext(${c.id}, this)" ${!c.isActive || !business.isQueueOpen ? 'disabled' : ''}>Call Next</button>
                                ${c.currentTokenId ? `<button class="btn btn-success" onclick="markServed(${c.currentTokenId}, this)">✓ Mark Served</button>` : ''}
                                ${c.isActive
                                    ? `<button class="btn btn-secondary" onclick="toggleCounter(${c.id}, false)">Deactivate</button>`
                                    : `<button class="btn btn-success" onclick="toggleCounter(${c.id}, true)">Activate</button>`}
                                <button class="btn btn-danger" onclick="deleteCounter(${c.id}, '${c.counterName.replace(/'/g, "\\'")}')">Delete</button>
                            </div>
                        </div>`).join('') : '<div class="empty-state">No counters yet — add one below</div>'}
                </div>
                <div class="new-counter-form">
                    <input type="text" id="newCounterName" placeholder="Counter name">
                    <select id="newCounterType">
                        ${getCounterTypeOptions(business.businessType)}
                    </select>
                    <input type="text" id="newCounterStaff" placeholder="Staff name (optional)">
                    <button class="btn btn-primary" id="addCounterBtn" onclick="addCounter(${businessId})">+ Add Counter</button>
                </div>
            </div>

            <div class="section">
                <h3>⭐ Recent Feedback</h3>
                ${feedback.length === 0 ? '<div class="empty-state">No feedback yet</div>' :
                    feedback.slice(0, 5).map(f => `
                        <div class="feedback-item">
                            <div class="feedback-header">
                                <span>${f.customerName || 'Customer'} — Token #${f.tokenNumber}</span>
                                <span class="stars">${'★'.repeat(f.overallRating || 0)}${'☆'.repeat(5 - (f.overallRating || 0))}</span>
                            </div>
                            <div style="color:#64748b;font-size:0.8rem;margin-bottom:4px;">
                                Wait: ${'★'.repeat(f.waitRating || 0)} • Service: ${'★'.repeat(f.serviceRating || 0)} •
                                ${f.wouldReturn ? '👍 Would return' : '👎 Would not return'}
                            </div>
                            ${f.comment ? `<div class="feedback-comment">"${f.comment}"</div>` : ''}
                        </div>`).join('')}
            </div>
        `;
    }

    async function toggleQueue(businessId, open, btnEl) {
        if (btnEl) { btnEl.disabled = true; btnEl.textContent = open ? 'Opening...' : 'Closing...'; }
        const endpoint = open ? 'open' : 'close';
        try {
            const res = await fetch(`${API}/api/business/queue/${endpoint}/${businessId}`, { method: 'PUT', headers: authHeaders() });
            if (res.ok) showToast(open ? 'Queue opened!' : 'Queue closed', 'success');
            else showToast('Action failed', 'error');
        } catch (e) {
            showToast('Network error', 'error');
        }
        loadBusinesses();
    }

    async function callNext(counterId, btnEl) {
        if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Calling...'; }
        try {
            const res = await fetch(`${API}/api/token/next/${counterId}`, { method: 'PUT', headers: authHeaders() });
            const data = await res.json();
            if (!res.ok) {
                showToast(data.error || 'No customers waiting', 'error');
            } else {
                showToast(`Token #${data.tokenNumber} called!`, 'success');
            }
        } catch (e) {
            showToast('Network error', 'error');
        }
        loadBusinessDetails(currentBusinessId);
    }

    async function markServed(tokenId, btnEl) {
        if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Marking...'; }
        try {
            const res = await fetch(`${API}/api/token/serve/${tokenId}`, { method: 'PUT', headers: authHeaders() });
            const data = await res.json();
            if (!res.ok) {
                showToast(data.error || 'Failed to mark as served', 'error');
            } else {
                showToast(`Token #${data.tokenNumber} marked as served!`, 'success');
            }
        } catch (e) {
            showToast('Network error', 'error');
        }
        loadBusinessDetails(currentBusinessId);
    }

    async function toggleCounter(counterId, activate) {
        const endpoint = activate ? 'activate' : 'deactivate';
        await fetch(`${API}/api/counter/${endpoint}/${counterId}`, { method: 'PUT', headers: authHeaders() });
        showToast(activate ? 'Counter activated' : 'Counter deactivated', 'success');
        loadBusinessDetails(currentBusinessId);
    }

    async function deleteCounter(counterId, counterName) {
        if (!confirm(`Delete counter "${counterName}"? This cannot be undone.`)) return;
        try {
            const res = await fetch(`${API}/api/counter/delete/${counterId}`, { method: 'DELETE', headers: authHeaders() });
            if (res.ok) {
                showToast('Counter deleted', 'success');
                loadBusinessDetails(currentBusinessId);
            } else {
                const data = await res.json().catch(() => ({}));
                showToast(data.error || 'Failed to delete counter', 'error');
            }
        } catch (e) {
            showToast('Network error', 'error');
        }
    }

    async function addCounter(businessId) {
        const counterNameInput = document.getElementById('newCounterName');
        const counterName = counterNameInput.value.trim();
        const counterType = document.getElementById('newCounterType').value;
        const staffName = document.getElementById('newCounterStaff').value;

        if (!counterName) { showToast('Counter name required', 'error'); return; }

        // Check for duplicate counter name within this business
        const countersRes = await fetch(`${API}/api/counter/list/${businessId}`, { headers: authHeaders() });
        const existingCounters = await countersRes.json();
        const duplicate = existingCounters.some(c => c.counterName.toLowerCase() === counterName.toLowerCase());
        if (duplicate) {
            showToast(`A counter named "${counterName}" already exists`, 'error');
            return;
        }

        const btn = document.getElementById('addCounterBtn');
        btn.disabled = true;
        btn.textContent = 'Adding...';

        try {
            const res = await fetch(`${API}/api/counter/create`, {
                method: 'POST', headers: authHeaders(),
                body: JSON.stringify({ businessId, counterName, counterType, staffName })
            });
            if (res.ok) {
                showToast('Counter added!', 'success');
                counterNameInput.value = '';
            } else {
                const data = await res.json().catch(() => ({}));
                showToast(data.error || 'Failed to add counter', 'error');
            }
        } catch (e) {
            showToast('Network error', 'error');
        }
        loadBusinessDetails(businessId);
    }

    setInterval(() => {
        const activeEl = document.activeElement;
        const isTyping = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'SELECT');
        if (currentBusinessId && !isTyping) loadBusinessDetails(currentBusinessId);
    }, 10000);
</script>
</body>
</html>
