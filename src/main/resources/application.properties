# Application
spring.application.name=smartq
server.port=${PORT:8080}

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smartq_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:c21hcnRxX3N1cGVyX3NlY3JldF9rZXlfMjAyNl92aWthc19kaGF5YWxfZG9fbm90X3NoYXJl}
jwt.expiration=86400000

# Mail (Mailgun - add later)
#spring.mail.host=smtp.mailgun.org
#spring.mail.port=587
#spring.mail.username=YOUR_MAILGUN_USERNAME
#spring.mail.password=YOUR_MAILGUN_PASSWORD
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# Mailgun
mailgun.api.key=${MAILGUN_API_KEY:placeholder}
mailgun.domain=${MAILGUN_DOMAIN:placeholder.mailgun.org}
mailgun.from.email=${MAILGUN_FROM:SmartQ <noreply@example.com>}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true

app.base.url=${APP_BASE_URL:http://localhost:8080}

spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/


