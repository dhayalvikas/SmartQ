version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smartq-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartq_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: smartq-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/smartq_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: c21hcnRxX3N1cGVyX3NlY3JldF9rZXlfMjAyNl92aWthc19kaGF5YWxfZG9fbm90X3NoYXJl
      MAILGUN_API_KEY: placeholder
      MAILGUN_DOMAIN: placeholder.mailgun.org
      SPRING_PROFILES_ACTIVE: default
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: